name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest / Python ${{ matrix.python-version }}
    runs-on: windows-latest          # Primary target is Windows; change to ubuntu-latest for Linux CI
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements_desktop.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      # Install core deps (skip PyQt5 in CI — Qt tests are mocked)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography watchdog paramiko pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-omit="tests/*,desktop_app.py,build_exe.py,create_release_zip.py,setup_wizard.py"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: .coverage

  lint:
    name: ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint (errors only)
        run: ruff check . --select E9,F63,F7,F82 --ignore F821
        # E9   — syntax errors
        # F63  — invalid assert / star-import syntax
        # F7   — undefined __all__ members
        # F82  — undefined names (catches typos in module-level code)

  api-test:
    name: API tests (Linux / Flask)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install flask gunicorn pytest pytest-cov
      - name: Run API tests only
        run: pytest tests/test_backupsys_api.py -v --tb=short
